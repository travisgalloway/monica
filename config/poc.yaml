# ~100M POC config. Target ~3B tokens (~Chinchilla for 100M), seq length 1024.
# The tied embedding (vocab x d_model ~= 50280*768 ~= 38M) is a large share of the
# budget -> tie_embeddings MUST stay true. d_model 768 x 24 layers lands near 100M.
d_model: 768           # d_inner = expand*d_model = 1536
n_layers: 24
d_state: 16            # SSM state width N (per head, shared B/C group)
expand: 2
d_conv: 4
head_dim: 64           # Mamba-2/SSD: 1536/64 = 24 heads (scalar A per head)
dt_rank: auto

vocab_size: 50280      # CONFIRMED: allenai/OLMo-7B-hf, vocab 50280 < 65536 (uint16)
seq_len: 1024
tie_embeddings: true

# CONFIRMED ON MLX (issue #3, reproduce: `python scripts/bench_precision.py`):
# fp16 ~4.37 TFLOP/s vs bf16 ~3.78 vs fp32 ~3.33 on this Metal GPU -> fp16 is ~16%
# faster than bf16 (and ~31% over fp32). Do NOT assume bf16. Use fp16 + loss scaling
# for the scale run (toy/smoke stay fp32 for exact resume).
precision: fp16
chunk_size: null       # SSD chunk length Q (null -> backend default 64)
grad_checkpoint: true  # REQUIRED at this depth: recompute layers in backward so the
                       # 24-layer fp16 backward fits in unified memory (else it swaps).

# dt-projection bias init (load-bearing)
dt_min: 0.001
dt_max: 0.1
dt_init_floor: 0.0001

# --- Recommended scale run (decision record; run params are CLI flags, NOT model
# config, so they live here as comments — load_config maps only model fields above).
#
# 1. Data prep (~3B OLMo tokens; see docs/design/04-data-pipeline.md). ~6GB packed:
#      python -m src.data.download --out data/raw --max-docs 3500000 --subset sample-10BT
#      python -m src.data.tokenize --in data/raw/fineweb-edu.txt --out data/packed.bin \
#          --max-tokens 3000000000
#      python -m src.data.split --packed data/packed.bin --out data/split --val-tokens 10000000
#
# 2. Train (~3B tokens = Chinchilla-ish for 100M). Tune batch/grad-accum to M-series
#    memory; warmup defaults to total_steps//100; fp16 -> dynamic loss scaling on:
#      .venv/bin/python scripts/train.py --config config/poc.yaml --data data/split \
#          --out runs/poc --total-tokens 3000000000 --batch-size 32 --grad-accum 4 \
#          --eval-every 200 --ckpt-every 500
#
# 3. Resume after an interruption (auto-detects runs/poc/resume if --resume omitted):
#      ... same command ...  --resume runs/poc/resume
#
# Success = a smoothly decreasing val_perplexity in runs/poc/metrics.jsonl with a
# stable grad_norm. Benchmark scores are NOT required (see issue #13).
